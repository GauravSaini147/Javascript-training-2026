<!DOCTYPE html>
<html>
<head>
  <title>JavaScript Alert </title>
</head>
<body>
  <script>
    // Single alert
    alert("Hello, World!");

    // Multiple alerts one after another
    alert("Welcome to JavaScript!");
    alert("This is an alert box.");
    alert("Alerts pause code execution until you click OK.");
  </script>
</body>
</html>
